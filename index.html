<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Me acuerdo de...</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Playfair+Display:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Fondo con textura -->
  <div class="ambient-bg"></div>

  <!-- ============================================= -->
  <!-- HEADER / PORTADA                              -->
  <!-- ============================================= -->
  <header class="site-header">
    <div class="header-inner">
      <h1 class="site-title">Me acuerdo de…</h1>
      <p class="site-subtitle">un libro de recuerdos</p>
      <div class="header-divider"></div>
    </div>
  </header>

  <!-- ============================================= -->
  <!-- CONTENIDO PRINCIPAL: feed + sidebar           -->
  <!-- ============================================= -->
  <div class="main-layout">

    <!-- Feed de recuerdos (scroll infinito) -->
    <main class="feed" id="feed">
      <div class="feed-inner" id="feedInner">
        <!-- Inyectado desde app.js -->
      </div>
      <div class="feed-end" id="feedEnd">
        <span class="end-line"></span>
        <p class="end-text">fin del diario</p>
        <span class="end-line"></span>
      </div>
    </main>

    <!-- Sidebar fijo (sticky) -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-sticky">

        <!-- F1 · Desbloqueo -->
        <section class="panel-section auth-section">
          <label class="auth-label" for="passwordField">Modo escritura</label>
          <div class="password-wrap">
            <input type="password" id="passwordField" class="password-field" placeholder="escribe la clave..." autocomplete="off"/>
            <button id="unlockBtn" class="btn-icon" aria-label="Desbloquear">→</button>
          </div>
          <p class="auth-hint" id="authHint">Modo lectura</p>
        </section>

        <!-- F5 · Calendario -->
        <section class="panel-section calendar-section">
          <h2 class="panel-title">Calendario</h2>
          <div class="calendar-nav">
            <button class="cal-btn" id="prevMonth">‹</button>
            <span class="cal-month-name" id="calMonthName">Junio 2026</span>
            <button class="cal-btn" id="nextMonth">›</button>
          </div>
          <div class="calendar-grid" id="calendarGrid"></div>
        </section>

        <!-- F6 · Archivo -->
        <section class="panel-section archive-section">
          <h2 class="panel-title">Archivo</h2>
          <ul class="archive-list" id="archiveList"></ul>
          <button class="clear-filter" id="clearFilter">Ver todos los recuerdos</button>
        </section>

        <!-- F7 · Búsqueda -->
        <section class="panel-section search-section">
          <h2 class="panel-title">Buscar</h2>
          <div class="search-wrap">
            <input type="text" id="searchField" class="search-field" placeholder="una palabra, un nombre..."/>
            <button id="searchBtn" class="btn-icon" aria-label="Buscar">⌕</button>
          </div>
        </section>

      </div>
    </aside>

  </div>

  <!-- ============================================= -->
  <!-- BOTÓN ESCRIBIR (modo edición)                 -->
  <!-- ============================================= -->
  <button class="fab-write" id="fabWrite" aria-label="Escribir recuerdo">+</button>

  <!-- ============================================= -->
  <!-- FORMULARIO DE ESCRITURA                       -->
  <!-- ============================================= -->
  <dialog class="write-dialog" id="writeDialog">
    <form method="dialog" class="write-form">
      <h2 class="write-title">Nuevo recuerdo</h2>
      <label class="write-label" for="entryDate">Fecha del recuerdo</label>
      <input type="date" id="entryDate" class="write-date" />
      <label class="write-label" for="entryContent">Me acuerdo de...</label>
      <textarea id="entryContent" class="write-textarea" rows="6" placeholder="..."></textarea>
      <div class="write-actions">
        <button type="button" class="btn-primary" id="saveEntry">Guardar</button>
        <button type="button" class="btn-secondary" id="cancelWrite">Cancelar</button>
      </div>
    </form>
  </dialog>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/archive.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
