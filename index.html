  <!-- ============================================= -->
  <!-- HEADER / PORTADA                              -->
  <!-- ============================================= -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-banner">
        <span class="banner-star">✦</span>
        <span class="banner-star">✧</span>
        <span class="banner-star">⋆</span>
        <span class="banner-star">✦</span>
        <span class="banner-star">✧</span>
      </div>
      <h1 class="site-title">Me acuerdo</h1>
      <div class="header-divider">
        <span class="divider-ornament">❧</span>
      </div>
      <div class="header-banner header-banner-bottom">
        <span class="banner-star">✦</span>
        <span class="banner-star">✧</span>
        <span class="banner-star">⋆</span>
        <span class="banner-star">✦</span>
        <span class="banner-star">✧</span>
      </div>
    </div>
  </header>

  <!-- ============================================= -->
  <!-- CONTENIDO PRINCIPAL: feed + sidebar           -->
  <!-- ============================================= -->
  <div class="main-layout">

    <!-- Feed de recuerdos (scroll infinito) -->
    <main class="feed" id="feed">
      <!-- Recuerdo del día destacado -->
      <div class="featured-memory-container" id="featuredMemory"></div>

      <div class="feed-inner" id="feedInner">
        <!-- Inyectado desde app.js -->
      </div>
      <div class="feed-end" id="feedEnd">
        <span class="end-line"></span>
        <span class="end-ornament">✦</span>
        <span class="end-line"></span>
        <button class="feed-write-btn" id="feedWriteBtn">✎ Escribir nuevo recuerdo</button>
        <span class="end-line"></span>
        <span class="end-ornament">✦</span>
        <span class="end-line"></span>
        <p class="end-text">fin del diario</p>
        <span class="end-line"></span>
        <span class="end-ornament">✦</span>
        <span class="end-line"></span>
      </div>
    </main>

    <!-- Sidebar fijo (sticky) -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-sticky">

        <!-- F1 · Desbloqueo -->
        <section class="panel-section auth-section">
          <div class="panel-ornament">❀</div>
          <div class="password-wrap">
            <input type="password" id="passwordField" class="password-field" placeholder="" autocomplete="off"/>
            <button id="unlockBtn" class="btn-icon-gif" aria-label="Desbloquear"><img src="assets/buttons/arrow_right.gif" alt="→" class="btn-gif-img"></button>
          </div>
          <button class="write-link" id="writeLink">✎ Escribir</button>
        </section>

        <!-- F5 · Calendario -->
        <section class="panel-section calendar-section">
          <div class="panel-ornament">❀</div>
          <h2 class="panel-title">Calendario</h2>
          <div class="calendar-nav">
            <button class="cal-btn" id="prevMonth">‹</button>
            <span class="cal-month-name" id="calMonthName">Junio 2026</span>
            <button class="cal-btn" id="nextMonth">›</button>
          </div>
          <div class="calendar-grid" id="calendarGrid"></div>
        </section>

        <!-- F6 · Archivo -->
        <section class="panel-section archive-section">
          <div class="panel-ornament">❀</div>
          <h2 class="panel-title">Archivo</h2>
          <ul class="archive-list" id="archiveList"></ul>
          <button class="clear-filter" id="clearFilter">✿ Ver todos los recuerdos</button>
        </section>

        <!-- F7 · Búsqueda -->
        <section class="panel-section search-section">
          <div class="panel-ornament">❀</div>
          <h2 class="panel-title">Buscar</h2>
          <div class="search-wrap">
            <input type="text" id="searchField" class="search-field" placeholder="una palabra, un nombre..."/>
            <button id="searchBtn" class="btn-icon-gif" aria-label="Buscar"><img src="assets/buttons/Magnifying_glass.gif" alt="⌕" class="btn-gif-img"></button>
          </div>
        </section>

        <!-- Shoutbox estilo Neocities -->
        <section class="panel-section shout-section">
          <div class="panel-ornament">❀</div>
          <h2 class="panel-title">Chat <button class="shout-refresh-btn" id="shoutRefresh" title="Actualizar">↻</button></h2>
          <form class="shout-form" id="shoutForm">
            <input type="text" id="shoutName" class="shout-name-field" placeholder="tu nombre (opcional)" maxlength="30">
            <div class="shout-input-row">
              <input type="text" id="shoutMsg" class="shout-msg-field" placeholder="deja un mensaje..." maxlength="200" required>
              <button type="submit" class="shout-send-btn" id="shoutSend">✦</button>
            </div>
          </form>
          <ul class="shout-list" id="shoutList">
            <li class="shout-empty">Cargando...</li>
          </ul>
        </section>

        <!-- ♫ Reproductor de música -->
        <section class="panel-section player-section">
          <div class="panel-ornament">❀</div>
          <h2 class="panel-title">Música</h2>
          <div class="player-controls">
            <button class="player-btn" id="prevBtn" title="Anterior">
              <img src="assets/buttons/Pixel Buttons/Music_Prev_Idle.png" alt="◀◀" class="player-btn-img">
            </button>
            <button class="player-btn player-play-btn" id="playBtn" title="Reproducir">
              <img src="assets/buttons/Pixel Buttons/Play_Idle.png" alt="▶" id="playBtnImg" class="player-btn-img">
            </button>
            <button class="player-btn" id="nextBtn" title="Siguiente">
              <img src="assets/buttons/Pixel Buttons/Music_Next_Idle.png" alt="▶▶" class="player-btn-img">
            </button>
          </div>
          <div class="player-track-info">
            <span class="player-track-name" id="trackName"></span>
            <span class="player-track-game" id="trackGame"></span>
          </div>
          <ul class="player-playlist" id="playlistItems"></ul>
          <audio id="playerAudio" preload="metadata"></audio>
        </section>

        <!-- Contador de visitas -->
        <section class="panel-section visitor-section">
          <div class="visitor-counter">
            <span class="visitor-ornament">★</span>
            <span class="visitor-label">visitas</span>
            <span class="visitor-number" id="visitorCount">0000</span>
            <span class="visitor-ornament">★</span>
          </div>
        </section>

        <!-- Selector de fondo (al final, no es lo principal) -->
        <section class="panel-section bg-selector-section collapsed">
          <h2 class="panel-title bg-selector-toggle">✧ Fondo</h2>
          <div class="bg-options">
            <button class="bg-option active" data-bg="pattern357" title="Pattern 357">
              <img src="assets/fondos/pattern 357.gif" alt="Pattern 357" class="bg-preview">
            </button>
            <button class="bg-option" data-bg="pattern362" title="Pattern 362">
              <img src="assets/fondos/pattern 362.gif" alt="Pattern 362" class="bg-preview">
            </button>
            <button class="bg-option" data-bg="flowers17" title="Flowers 17">
              <img src="assets/fondos/flowers 17.gif" alt="Flowers 17" class="bg-preview">
            </button>
            <button class="bg-option" data-bg="flowers27" title="Flowers 27">
              <img src="assets/fondos/flowers 27.gif" alt="Flowers 27" class="bg-preview">
            </button>
            <button class="bg-option" data-bg="none" title="Sin fondo">
              <span class="bg-none-preview">sin</span>
            </button>
          </div>
        </section>

      </div>

  <!-- ============================================= -->
  <!-- FORMULARIO DE ESCRITURA                       -->
  <!-- ============================================= -->
  <dialog class="write-dialog" id="writeDialog">
    <form method="dialog" class="write-form">
      <h2 class="write-title">✎ Nuevo recuerdo</h2>
      <label class="write-label" for="entryDate">Fecha del recuerdo</label>
      <input type="date" id="entryDate" class="write-date" />
      <label class="write-label" for="entryContent">Me acuerdo de...</label>
      <textarea id="entryContent" class="write-textarea" rows="6" placeholder="..."></textarea>
      <div class="write-actions">
        <button type="button" class="btn-primary" id="saveEntry">Guardar ✦</button>
        <button type="button" class="btn-secondary" id="cancelWrite">Cancelar</button>
      </div>
    </form>
  </dialog>

  <!-- Barra inferior Now Playing -->
  <div class="now-playing-bar" id="nowPlayingBar">
    <marquee class="now-playing-marquee" id="playerMarquee" scrollamount="3" behavior="scroll" direction="left">♫ Now Playing: Theme of Love</marquee>
    <span class="now-playing-days">
      <span class="npd-ornament">✦</span>
      <span class="npd-number" id="daysCount">000</span>
      <span class="npd-ornament">✦</span>
    </span>
  </div>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/archive.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/player.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/app.js"></script>

  <script>
    // Contador de días desde el 25 de mayo de 2024
    (function() {
      const start = new Date(2024, 4, 25);
      const today = new Date();
      today.setHours(0,0,0,0);
      const diff = Math.floor((today - start) / (1000 * 60 * 60 * 24));
      document.getElementById('daysCount').textContent = String(diff).padStart(3, '0');
    })();

    // Selector de fondos (colapsable)
    document.addEventListener('DOMContentLoaded', function() {
      const bgButtons = document.querySelectorAll('.bg-option');
      const body = document.body;

      bgButtons.forEach(btn => {
        btn.addEventListener('click', function() {
          bgButtons.forEach(b => b.classList.remove('active'));
          this.classList.add('active');

          const bg = this.dataset.bg;
          body.classList.remove('bg-pattern357', 'bg-pattern362', 'bg-flowers17', 'bg-flowers27');
          if (bg !== 'none') {
            body.classList.add('bg-' + bg);
          }
        });
      });

      // Toggle colapso del selector de fondos
      document.querySelector('.bg-selector-toggle').addEventListener('click', function() {
        this.closest('.bg-selector-section').classList.toggle('collapsed');
      });
    });
  </script>
</body>
