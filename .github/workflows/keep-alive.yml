name: Keep Supabase alive

on:
  schedule:
    # Cada 48 horas — lunes, miércoles, viernes a las 12:00 UTC
    - cron: '0 12 */2 * *'
  workflow_dispatch: # permite ejecutarlo manualmente desde GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Vercel (y despierta Supabase)
        run: curl -s -o /dev/null -w "%{http_code}" https://meacuerdo.vercel.app
